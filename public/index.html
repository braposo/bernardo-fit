<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bernardo Raposo — where I'd fit</title>
<meta name="description" content="Paste a role and I'll tell you, honestly, where I'd fit." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400;1,6..72,500&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper: #f4f2ec;
    --paper-raised: #faf9f5;
    --ink: #1c1b19;
    --ink-soft: #56534c;
    --line: #e1ddd2;
    --cobalt: #24487a;
    --cobalt-deep: #1a3860;
    --ochre: #b8892f;
    --good: #2f6b4f;
    --warn: #a86a2b;
    --weak: #9a4034;
    --serif: "Newsreader", Georgia, serif;
    --sans: "Hanken Grotesk", system-ui, sans-serif;
    --maxw: 720px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  body {
    background-image:
      radial-gradient(circle at 12% -8%, rgba(36,72,122,0.05), transparent 42%),
      radial-gradient(circle at 92% 4%, rgba(184,137,47,0.05), transparent 40%);
    background-attachment: fixed;
  }

  .wrap {
    max-width: var(--maxw);
    margin: 0 auto;
    padding: clamp(28px, 6vw, 72px) clamp(20px, 5vw, 40px) 96px;
  }

  /* --- Masthead --- */
  .masthead {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--line);
    flex-wrap: wrap;
  }
  .mark {
    font-family: var(--serif);
    font-size: 21px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }
  .mark .dot { color: var(--cobalt); }
  .masthead .kicker {
    font-size: 11.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 600;
  }

  /* --- Input state --- */
  .lede {
    font-family: var(--serif);
    font-size: clamp(28px, 5.4vw, 44px);
    line-height: 1.12;
    letter-spacing: -0.018em;
    font-weight: 400;
    margin: clamp(36px, 8vw, 72px) 0 0;
    max-width: 15ch;
  }
  .lede em { font-style: italic; color: var(--cobalt); }
  .sub {
    margin: 20px 0 0;
    font-size: 17px;
    line-height: 1.6;
    color: var(--ink-soft);
    max-width: 46ch;
  }

  .composer { margin-top: 34px; }
  textarea {
    width: 100%;
    min-height: 200px;
    resize: vertical;
    background: var(--paper-raised);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 18px 18px;
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.65;
    color: var(--ink);
    transition: border-color 0.18s ease, box-shadow 0.18s ease;
  }
  textarea::placeholder { color: #9d998f; }
  textarea:focus {
    outline: none;
    border-color: var(--cobalt);
    box-shadow: 0 0 0 3px rgba(36,72,122,0.12);
  }

  .row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 18px;
    flex-wrap: wrap;
  }
  button.primary {
    appearance: none;
    border: none;
    background: var(--cobalt);
    color: #fff;
    font-family: var(--sans);
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 0.01em;
    padding: 13px 24px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.18s ease, transform 0.12s ease;
  }
  button.primary:hover { background: var(--cobalt-deep); }
  button.primary:active { transform: translateY(1px); }
  button.primary:disabled { opacity: 0.5; cursor: not-allowed; }
  button.ghost {
    appearance: none;
    background: none;
    border: 1px solid var(--line);
    color: var(--ink);
    font-family: var(--sans);
    font-weight: 500;
    font-size: 14px;
    padding: 11px 18px;
    border-radius: 4px;
    cursor: pointer;
    transition: border-color 0.18s ease, background 0.18s ease;
  }
  button.ghost:hover { border-color: var(--ink-soft); background: rgba(0,0,0,0.02); }
  .hint { font-size: 13px; color: var(--ink-soft); }

  /* --- Loading --- */
  .loading {
    margin-top: 40px;
    font-family: var(--serif);
    font-size: 20px;
    font-style: italic;
    color: var(--ink-soft);
  }
  .loading .pen {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--cobalt);
    margin-left: 4px;
    animation: pulse 1.1s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.25;transform:scale(0.8);} 50%{opacity:1;transform:scale(1.15);} }

  .error {
    margin-top: 28px;
    padding: 16px 18px;
    border-left: 3px solid var(--weak);
    background: rgba(154,64,52,0.06);
    color: var(--weak);
    font-size: 14.5px;
    border-radius: 0 4px 4px 0;
  }

  /* --- Report --- */
  .report { margin-top: 8px; animation: rise 0.6s cubic-bezier(0.2,0.7,0.2,1) both; }
  @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }

  .to-line {
    margin-top: clamp(34px, 7vw, 60px);
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 600;
  }
  .role-title {
    font-family: var(--serif);
    font-size: clamp(25px, 4.6vw, 34px);
    line-height: 1.15;
    letter-spacing: -0.015em;
    margin: 8px 0 0;
    font-weight: 500;
  }
  .role-title .company { color: var(--cobalt); }

  .verdict-strip {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-top: 22px;
    flex-wrap: wrap;
  }
  .chip {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 6px 12px;
    border-radius: 100px;
  }
  .chip.strong { background: rgba(47,107,79,0.12); color: var(--good); }
  .chip.good { background: rgba(36,72,122,0.12); color: var(--cobalt); }
  .chip.partial { background: rgba(168,106,43,0.14); color: var(--warn); }
  .chip.weak { background: rgba(154,64,52,0.12); color: var(--weak); }

  .measure { flex: 1; min-width: 180px; }
  .measure .track {
    height: 6px;
    background: #e6e2d8;
    border-radius: 100px;
    overflow: hidden;
  }
  .measure .fill {
    height: 100%;
    border-radius: 100px;
    width: 0;
    transition: width 1.1s cubic-bezier(0.2,0.7,0.2,1);
  }
  .measure .caption {
    display: flex;
    justify-content: space-between;
    margin-top: 7px;
    font-size: 12px;
    color: var(--ink-soft);
    font-variant-numeric: tabular-nums;
  }

  .pitch {
    font-family: var(--serif);
    font-size: clamp(21px, 3.6vw, 27px);
    line-height: 1.42;
    letter-spacing: -0.01em;
    margin: clamp(30px, 6vw, 44px) 0 0;
    font-weight: 400;
  }
  .pitch::first-letter {
    /* subtle drop-cap for the opening line */
    initial-letter: 2;
    -webkit-initial-letter: 2;
    color: var(--cobalt);
    font-weight: 500;
    margin-right: 10px;
  }

  .section-label {
    margin: clamp(44px, 8vw, 64px) 0 20px;
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-label::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  /* Category rows */
  .cat { padding: 16px 0; border-bottom: 1px solid var(--line); }
  .cat:last-child { border-bottom: none; }
  .cat-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 14px;
  }
  .cat-name { font-weight: 600; font-size: 15.5px; }
  .cat-score { font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .cat-track { height: 4px; background: #e6e2d8; border-radius: 100px; margin: 10px 0 10px; overflow: hidden; }
  .cat-fill { height: 100%; width: 0; border-radius: 100px; transition: width 0.9s cubic-bezier(0.2,0.7,0.2,1); }
  .cat-note { font-size: 14.5px; line-height: 1.55; color: var(--ink-soft); }

  /* Differentiators — the centrepiece */
  .diffs { counter-reset: diff; }
  .diff {
    display: grid;
    grid-template-columns: 44px 1fr;
    gap: 4px 18px;
    padding: 22px 0;
    border-top: 1px solid var(--line);
    align-items: start;
  }
  .diff:first-child { border-top: none; }
  .diff::before {
    counter-increment: diff;
    content: counter(diff, decimal-leading-zero);
    font-family: var(--serif);
    font-size: 20px;
    color: var(--ochre);
    font-weight: 500;
    grid-row: span 2;
    padding-top: 2px;
  }
  .diff-headline {
    font-family: var(--serif);
    font-size: clamp(19px, 3vw, 23px);
    line-height: 1.25;
    letter-spacing: -0.01em;
    font-weight: 500;
  }
  .diff-detail { font-size: 15px; line-height: 1.55; color: var(--ink-soft); margin-top: 6px; }

  .closing {
    font-family: var(--serif);
    font-size: clamp(19px, 3vw, 23px);
    font-style: italic;
    line-height: 1.45;
    color: var(--ink);
    margin: clamp(40px, 7vw, 56px) 0 0;
    padding-top: clamp(30px, 6vw, 44px);
    border-top: 1px solid var(--line);
  }
  .sign {
    margin-top: 20px;
    font-family: var(--serif);
    font-size: 22px;
    color: var(--cobalt);
  }
  .sign small {
    display: block;
    font-family: var(--sans);
    font-size: 13px;
    color: var(--ink-soft);
    letter-spacing: 0.02em;
    margin-top: 4px;
    font-style: normal;
  }

  /* Share bar */
  .sharebar {
    position: sticky;
    bottom: 16px;
    margin: 44px auto 0;
    background: var(--paper-raised);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 12px 12px 12px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 6px 24px rgba(28,27,25,0.08);
    flex-wrap: wrap;
  }
  .sharebar .lbl { font-size: 13.5px; color: var(--ink-soft); flex: 1; min-width: 160px; }
  .sharebar .lbl b { color: var(--ink); font-weight: 600; }
  .linkbtn {
    appearance: none;
    border: 1px solid var(--line);
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    font-weight: 600;
    font-size: 13.5px;
    padding: 9px 15px;
    border-radius: 5px;
    cursor: pointer;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .linkbtn:hover { border-color: var(--cobalt); color: var(--cobalt); }
  .linkbtn.done { border-color: var(--good); color: var(--good); }

  .footer {
    margin-top: 60px;
    padding-top: 22px;
    border-top: 1px solid var(--line);
    font-size: 13px;
    color: var(--ink-soft);
    display: flex;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .footer a { color: var(--cobalt); text-decoration: none; }
  .footer a:hover { text-decoration: underline; }

  .restart {
    margin-top: 30px;
  }
  .restart button {
    appearance: none;
    background: none;
    border: none;
    color: var(--cobalt);
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    padding: 0;
  }
  .restart button:hover { text-decoration: underline; }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }

  :focus-visible { outline: 2px solid var(--cobalt); outline-offset: 2px; border-radius: 3px; }
</style>
</head>
<body>
  <main class="wrap" id="app"></main>

<script>
(function () {
  "use strict";

  var app = document.getElementById("app");
  var state = { view: "input", jd: "", report: null, id: null, error: null, cached: false };

  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function scoreColor(n) {
    if (n >= 90) return "var(--good)";
    if (n >= 75) return "var(--cobalt)";
    if (n >= 60) return "var(--warn)";
    return "var(--weak)";
  }
  function verdictClass(v) {
    return ({ STRONG_MATCH: "strong", GOOD_MATCH: "good", PARTIAL_MATCH: "partial", WEAK_MATCH: "weak" })[v] || "good";
  }
  function verdictLabel(v) {
    return ({ STRONG_MATCH: "Strong fit", GOOD_MATCH: "Good fit", PARTIAL_MATCH: "Partial fit", WEAK_MATCH: "Honest stretch" })[v] || "Good fit";
  }

  var MASTHEAD =
    '<div class="masthead">' +
      '<div class="mark">Bernardo Raposo<span class="dot">.</span></div>' +
      '<div class="kicker">Where I\'d fit</div>' +
    '</div>';

  var FOOTER =
    '<div class="footer">' +
      '<span>Written by me, with a little help from Claude.</span>' +
      '<span><a href="mailto:hi@bernardoraposo.com">hi@bernardoraposo.com</a> · <a href="https://linkedin.com/in/braposo" target="_blank" rel="noopener">LinkedIn</a></span>' +
    '</div>';

  function renderInput() {
    app.innerHTML =
      MASTHEAD +
      '<h1 class="lede">Paste the role. I\'ll tell you <em>where I\'d fit</em>.</h1>' +
      '<p class="sub">Drop in a job description below and I\'ll give you an honest read — what I bring, where the gaps are, and what makes me different from the other people in your pipeline. You\'ll get a link you can keep.</p>' +
      '<div class="composer">' +
        '<textarea id="jd" placeholder="Paste the full job description here…" aria-label="Job description">' + esc(state.jd) + '</textarea>' +
        (state.error ? '<div class="error">' + esc(state.error) + '</div>' : '') +
        '<div class="row">' +
          '<button class="primary" id="go">See where I fit</button>' +
          '<span class="hint">Takes about ten seconds.</span>' +
        '</div>' +
      '</div>' +
      FOOTER;

    document.getElementById("go").addEventListener("click", runAnalyze);
    var ta = document.getElementById("jd");
    ta.addEventListener("input", function () { state.jd = ta.value; });
    ta.addEventListener("keydown", function (e) {
      if ((e.metaKey || e.ctrlKey) && e.key === "Enter") runAnalyze();
    });
  }

  function renderLoading() {
    app.innerHTML =
      MASTHEAD +
      '<div class="loading">Reading the role, thinking it through<span class="pen"></span></div>';
  }

  function renderReport(r, id) {
    var cats = (r.categories || []).map(function (c) {
      return (
        '<div class="cat">' +
          '<div class="cat-head">' +
            '<span class="cat-name">' + esc(c.name) + '</span>' +
            '<span class="cat-score" style="color:' + scoreColor(c.score) + '">' + esc(c.score) + '</span>' +
          '</div>' +
          '<div class="cat-track"><div class="cat-fill" data-w="' + esc(c.score) + '" style="background:' + scoreColor(c.score) + '"></div></div>' +
          '<div class="cat-note">' + esc(c.note) + '</div>' +
        '</div>'
      );
    }).join("");

    var diffs = (r.differentiators || []).map(function (d) {
      return (
        '<div class="diff">' +
          '<div class="diff-headline">' + esc(d.headline) + '</div>' +
          '<div class="diff-detail">' + esc(d.detail) + '</div>' +
        '</div>'
      );
    }).join("");

    var roleLine = esc(r.job_title || "This role");
    if (r.company) roleLine += ' <span class="company">at ' + esc(r.company) + '</span>';

    app.innerHTML =
      MASTHEAD +
      '<div class="report">' +
        '<div class="to-line">On fit for</div>' +
        '<h1 class="role-title">' + roleLine + '</h1>' +
        '<div class="verdict-strip">' +
          '<span class="chip ' + verdictClass(r.overall_verdict) + '">' + esc(verdictLabel(r.overall_verdict)) + '</span>' +
          '<div class="measure">' +
            '<div class="track"><div class="fill" data-w="' + esc(r.overall_score) + '" style="background:' + scoreColor(r.overall_score) + '"></div></div>' +
            '<div class="caption"><span>My honest read</span><span>' + esc(r.overall_score) + ' / 100</span></div>' +
          '</div>' +
        '</div>' +

        '<p class="pitch">' + esc(r.pitch) + '</p>' +

        '<div class="section-label">Where I land</div>' +
        cats +

        '<div class="section-label">What sets me apart</div>' +
        '<div class="diffs">' + diffs + '</div>' +

        (r.closing ? '<p class="closing">' + esc(r.closing) + '</p>' : '') +
        '<div class="sign">— Bernardo<small>Available now · Remote-first · Harrogate, UK</small></div>' +

        '<div class="sharebar">' +
          '<span class="lbl">' + (state.cached ? '<b>Already analysed.</b> This role was run before — same link, same read.' : '<b>Keep this link.</b> It\'ll always show this exact read.') + '</span>' +
          '<button class="linkbtn" id="copy">Copy link</button>' +
          '<a class="linkbtn" href="/bernardo-raposo-cv.pdf" target="_blank" rel="noopener">Download CV</a>' +
          '<button class="linkbtn" id="new">New role</button>' +
        '</div>' +

        '<div class="restart"></div>' +
      '</div>' +
      FOOTER;

    // animate the measures
    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        Array.prototype.forEach.call(document.querySelectorAll(".fill,.cat-fill"), function (el) {
          el.style.width = el.getAttribute("data-w") + "%";
        });
      });
    });

    var copyBtn = document.getElementById("copy");
    copyBtn.addEventListener("click", function () {
      var url = location.origin + location.pathname + "?r=" + encodeURIComponent(id);
      navigator.clipboard.writeText(url).then(function () {
        copyBtn.textContent = "Link copied";
        copyBtn.classList.add("done");
        setTimeout(function () { copyBtn.textContent = "Copy link"; copyBtn.classList.remove("done"); }, 2200);
      });
    });
    document.getElementById("new").addEventListener("click", function () {
      history.pushState({}, "", location.pathname);
      state.view = "input"; state.report = null; state.id = null; state.error = null; state.jd = ""; state.cached = false;
      renderInput();
    });
  }

  function render() {
    if (state.view === "loading") return renderLoading();
    if (state.view === "report" && state.report) return renderReport(state.report, state.id);
    return renderInput();
  }

  function runAnalyze() {
    var jd = (state.jd || "").trim();
    if (jd.length < 20) { state.error = "Paste a bit more of the role so I can give you a real read."; return render(); }
    state.error = null;
    state.view = "loading";
    render();

    fetch("/api/analyze", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ jobDescription: jd }),
    })
      .then(function (res) { return res.json().then(function (d) { return { ok: res.ok, d: d }; }); })
      .then(function (out) {
        if (!out.ok) throw new Error(out.d && out.d.error ? out.d.error : "Something went wrong.");
        state.report = out.d.report;
        state.id = out.d.id;
        state.cached = !!out.d.cached;
        state.view = "report";
        history.pushState({}, "", location.pathname + "?r=" + encodeURIComponent(out.d.id));
        render();
      })
      .catch(function (err) {
        state.view = "input";
        state.error = err.message || "Something went wrong. Try again.";
        render();
      });
  }

  function loadFromPermalink(id) {
    state.view = "loading";
    render();
    fetch("/api/report?id=" + encodeURIComponent(id))
      .then(function (res) { return res.json().then(function (d) { return { ok: res.ok, d: d }; }); })
      .then(function (out) {
        if (!out.ok) throw new Error("This link couldn't be found.");
        state.report = out.d.report;
        state.id = id;
        state.cached = false;
        state.view = "report";
        render();
      })
      .catch(function () {
        state.view = "input";
        state.error = "That link couldn't be found — it may have expired. You can run a fresh one below.";
        render();
      });
  }

  // Boot: permalink or fresh
  var params = new URLSearchParams(location.search);
  var rid = params.get("r");
  if (rid) loadFromPermalink(rid);
  else renderInput();

  window.addEventListener("popstate", function () {
    var p = new URLSearchParams(location.search).get("r");
    if (p) loadFromPermalink(p);
    else { state.view = "input"; renderInput(); }
  });
})();
</script>
</body>
</html>
