<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bernardo Raposo — where I'd fit</title>
<meta name="description" content="Paste a role and I'll tell you, honestly, where I'd fit." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --accent: oklch(0.52 0.14 250);
    --accent-deep: oklch(0.42 0.14 250);
    --accent-soft: oklch(0.52 0.14 250 / 0.10);
    --good: oklch(0.52 0.11 155);
    --warn: oklch(0.64 0.13 70);
    --weak: oklch(0.54 0.15 25);
    --weak-soft: oklch(0.54 0.15 25 / 0.10);
    --paper: #faf8f4;
    --ink: #211f1a;
    --sub: #78746a;
    --body2: #45423a;
    --hair: rgba(33, 31, 26, 0.11);
    --hair-strong: rgba(33, 31, 26, 0.2);
    --track: rgba(33, 31, 26, 0.07);
    --sans: 'IBM Plex Sans', 'Helvetica Neue', sans-serif;
    --display: 'Schibsted Grotesk', 'Helvetica Neue', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
    --maxw: 1080px;
    --pad: clamp(24px, 7vw, 100px);
    --ease: cubic-bezier(0.22, 0.68, 0.24, 1);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: var(--paper); color: var(--ink);
    font-family: var(--sans); -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
  }
  a { color: var(--ink); text-decoration: none; border-bottom: 1px solid var(--hair-strong); transition: border-color 0.2s var(--ease), color 0.2s var(--ease); }
  a:hover { color: var(--accent-deep); border-color: var(--accent); }
  ::selection { background: var(--accent-soft); }

  .frame { max-width: var(--maxw); margin: 0 auto; padding: 0 var(--pad); }

  /* Masthead — light, airy */
  .masthead {
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    padding: clamp(22px, 4vw, 34px) 0 clamp(18px, 3vw, 24px); flex-wrap: wrap;
  }
  .mark { font-family: var(--display); font-size: 28px; font-weight: 600; letter-spacing: -0.01em; }
  .mark .dot { color: var(--accent); }
  .kicker {
    font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--sub);
  }

  /* Input */
  .lede {
    font-family: var(--display); font-size: clamp(40px, 9vw, 88px); font-weight: 600;
    line-height: 1.0; letter-spacing: -0.035em; margin: clamp(48px, 12vw, 120px) 0 0; max-width: 15ch;
    text-wrap: balance;
  }
  .lede em { font-style: normal; color: var(--accent); }
  .sub { margin: 26px 0 0; font-size: clamp(16px, 2.2vw, 18px); line-height: 1.62; color: var(--sub); max-width: 44ch; }

  .composer { margin-top: clamp(32px, 5vw, 48px); }
  textarea {
    width: 100%; min-height: 176px; resize: vertical; background: transparent;
    border: none; border-top: 1px solid var(--hair); border-bottom: 1px solid var(--hair);
    padding: 20px 2px; font-family: var(--sans); font-size: 16px; line-height: 1.6; color: var(--ink);
    transition: border-color 0.25s var(--ease);
  }
  textarea::placeholder { color: #aaa498; }
  textarea:focus { outline: none; border-bottom-color: var(--accent); }

  .row { display: flex; align-items: center; gap: 20px; margin-top: 26px; flex-wrap: wrap; }
  button.primary {
    appearance: none; border: none; background: var(--ink); color: var(--paper);
    font-family: var(--sans); font-weight: 500; font-size: 15px; letter-spacing: 0.01em;
    padding: 15px 30px; border-radius: 100px; cursor: pointer;
    transition: background 0.22s var(--ease), transform 0.14s var(--ease), box-shadow 0.22s var(--ease);
    width: 100%; box-shadow: 0 1px 2px rgba(33,31,26,0.08);
  }
  @media (min-width: 480px) { button.primary { width: auto; } }
  button.primary:hover { background: var(--accent-deep); box-shadow: 0 6px 20px oklch(0.42 0.14 250 / 0.28); transform: translateY(-1px); }
  button.primary:active { transform: translateY(0); }
  .hint { font-family: var(--mono); font-size: 11.5px; letter-spacing: 0.04em; color: var(--sub); }

  .loading {
    margin-top: clamp(60px, 14vw, 120px); font-family: var(--display); font-size: clamp(22px, 4vw, 30px);
    font-weight: 500; color: var(--sub); display: flex; align-items: center; gap: 12px; letter-spacing: -0.01em;
  }
  .loading .pen { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:0.2;transform:scale(0.7);} 50%{opacity:1;transform:scale(1.1);} }

  .error {
    margin-top: 22px; padding: 13px 0 13px 16px; border-left: 2px solid var(--weak);
    color: var(--weak); font-size: 14px;
  }

  /* Report — fluid, unboxed */
  .report > * { animation: rise 0.6s var(--ease) both; }
  .report > *:nth-child(2) { animation-delay: 0.04s; }
  .report > *:nth-child(3) { animation-delay: 0.08s; }
  @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }

  .to-line { margin-top: clamp(40px, 8vw, 72px); font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--sub); }
  .role-title {
    font-family: var(--display); font-size: clamp(30px, 6.5vw, 62px); line-height: 1.02;
    letter-spacing: -0.035em; margin: 12px 0 0; font-weight: 600; text-wrap: balance;
  }
  .role-title .company { color: var(--accent); }

  /* Verdict — open composition, no box */
  .verdict {
    margin-top: clamp(40px, 7vw, 64px); padding-bottom: clamp(36px, 6vw, 52px);
    border-bottom: 1px solid var(--hair);
    display: grid; grid-template-columns: auto 1fr; gap: clamp(24px, 5vw, 48px); align-items: end;
  }
  .verdict-score { display: flex; flex-direction: column; }
  .verdict-score .num {
    font-family: var(--display); font-weight: 600; font-size: clamp(88px, 20vw, 168px); line-height: 0.82;
    letter-spacing: -0.055em; font-variant-numeric: tabular-nums;
  }
  .verdict-meter { margin-top: 18px; height: 3px; background: var(--track); border-radius: 3px; overflow: hidden; width: clamp(120px, 30vw, 200px); }
  .verdict-meter .fill { display: block; height: 100%; width: 0; border-radius: 3px; transition: width 1.1s var(--ease); }
  .verdict-copy { padding-bottom: 6px; }
  .verdict-label {
    font-family: var(--mono); font-size: 11px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .verdict-label::before { content: ""; width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
  .verdict-copy .pitch {
    font-family: var(--display); font-size: clamp(19px, 2.6vw, 28px); font-weight: 400; line-height: 1.4;
    letter-spacing: -0.015em; margin: 16px 0 0; color: var(--ink); text-wrap: pretty; max-width: 34ch;
  }

  /* Section label */
  .section-label {
    margin: clamp(48px, 8vw, 76px) 0 clamp(22px, 3vw, 30px); font-family: var(--mono); font-size: 10.5px;
    letter-spacing: 0.22em; text-transform: uppercase; color: var(--sub);
  }

  /* Categories — editorial list, no boxes */
  .cats { display: flex; flex-direction: column; }
  .cat {
    display: grid; grid-template-columns: clamp(54px, 9vw, 96px) minmax(0, 22ch) 1fr; column-gap: clamp(18px, 4vw, 48px); row-gap: 10px;
    padding: clamp(22px, 3.4vw, 34px) 0; border-top: 1px solid var(--hair); align-items: baseline;
  }
  .cat:last-child { border-bottom: 1px solid var(--hair); }
  .cat-score { font-family: var(--display); font-weight: 500; font-size: clamp(34px, 5vw, 52px); letter-spacing: -0.035em; line-height: 0.9; font-variant-numeric: tabular-nums; grid-row: span 2; }
  .cat-name { font-family: var(--display); font-weight: 600; font-size: clamp(16px, 2.2vw, 21px); letter-spacing: -0.01em; }
  .cat-body { display: flex; flex-direction: column; gap: 12px; }
  .cat-note { font-size: clamp(14.5px, 1.5vw, 16px); line-height: 1.55; color: var(--sub); text-wrap: pretty; max-width: 56ch; }
  .cat-meter { height: 2px; background: var(--track); border-radius: 2px; overflow: hidden; max-width: 340px; }
  .cat-meter .fill { display: block; height: 100%; width: 0; border-radius: 2px; transition: width 1s var(--ease); }

  /* Differentiators */
  .diffs { display: flex; flex-direction: column; }
  .diff {
    display: grid; grid-template-columns: clamp(54px, 9vw, 96px) 1fr; column-gap: clamp(18px, 4vw, 48px); row-gap: 6px;
    padding: clamp(24px, 3.6vw, 36px) 0; border-top: 1px solid var(--hair); align-items: start;
  }
  .diff:last-child { border-bottom: 1px solid var(--hair); }
  .diff-idx {
    font-family: var(--display); font-size: clamp(30px, 5vw, 50px); color: var(--accent); font-weight: 500;
    grid-row: span 2; line-height: 0.85; letter-spacing: -0.03em; font-variant-numeric: tabular-nums;
  }
  .diff-headline { font-family: var(--display); font-size: clamp(18px, 2.8vw, 26px); font-weight: 600; line-height: 1.22; letter-spacing: -0.015em; }
  .diff-detail { font-size: clamp(15px, 1.5vw, 16.5px); line-height: 1.58; color: var(--sub); margin-top: 8px; max-width: 62ch; }

  /* Closing — open, no band */
  .closing-wrap { margin-top: clamp(48px, 8vw, 76px); }
  .closing {
    font-family: var(--display); font-size: clamp(22px, 4vw, 40px); font-weight: 500; line-height: 1.28;
    margin: 0; letter-spacing: -0.025em; text-wrap: pretty;
  }
  .closing .accent { color: var(--accent); }
  .sign { margin-top: 24px; font-family: var(--display); font-weight: 600; font-size: 17px; }
  .sign small { display: block; font-family: var(--mono); font-size: 11px; color: var(--sub); margin-top: 6px; font-weight: 400; letter-spacing: 0.06em; }

  /* Share row — minimal, inline */
  .sharebar {
    margin-top: clamp(40px, 7vw, 60px); padding-top: clamp(24px, 4vw, 32px); border-top: 1px solid var(--hair);
    display: flex; align-items: center; gap: 12px 20px; flex-wrap: wrap;
  }
  .sharebar .lbl { font-size: 13.5px; color: var(--sub); flex: 1; min-width: 180px; line-height: 1.5; }
  .sharebar .lbl b { color: var(--ink); font-weight: 600; }
  .linkbtn {
    appearance: none; border: 1px solid var(--hair-strong); background: transparent; color: var(--ink);
    font-family: var(--sans); font-weight: 500; font-size: 13.5px; padding: 10px 18px; border-radius: 100px;
    cursor: pointer; transition: border-color 0.2s var(--ease), color 0.2s var(--ease), background 0.2s var(--ease);
    line-height: 1;
  }
  .linkbtn:hover { border-color: var(--accent); color: var(--accent-deep); }
  .linkbtn.done { border-color: var(--good); color: var(--good); }

  .footer {
    margin: clamp(56px, 9vw, 90px) 0 clamp(40px, 6vw, 56px); padding-top: 22px; border-top: 1px solid var(--hair);
    font-family: var(--mono); font-size: 11.5px; letter-spacing: 0.03em; color: var(--sub);
    display: flex; justify-content: space-between; gap: 14px; flex-wrap: wrap;
  }

  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; border-radius: 2px; }

  @media (max-width: 560px) {
    .verdict { grid-template-columns: 1fr; align-items: start; gap: 20px; }
    .verdict-copy { padding-bottom: 0; }
    .cat { grid-template-columns: clamp(48px, 16vw, 64px) 1fr; row-gap: 6px; }
  }
</style>
</head>
<body>
  <main id="app"></main>

<script>
(function () {
  "use strict";

  var app = document.getElementById("app");
  var state = { view: "input", jd: "", report: null, id: null, error: null, cached: false };
  var DEMO = new URLSearchParams(location.search).get("demo") === "1";

  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function tier(n) {
    if (n >= 90) return "strong";
    if (n >= 75) return "good";
    if (n >= 60) return "partial";
    return "weak";
  }
  function tierColor(t) {
    return ({ strong: "var(--good)", good: "var(--accent)", partial: "var(--warn)", weak: "var(--weak)" })[t];
  }
  function verdictClass(v) {
    return ({ STRONG_MATCH: "strong", GOOD_MATCH: "good", PARTIAL_MATCH: "partial", WEAK_MATCH: "weak" })[v] || "good";
  }
  function verdictLabel(v) {
    return ({ STRONG_MATCH: "Strong fit", GOOD_MATCH: "Good fit", PARTIAL_MATCH: "Partial fit", WEAK_MATCH: "Honest stretch" })[v] || "Good fit";
  }

  var MASTHEAD =
    '<div class="frame"><div class="masthead">' +
      '<div class="mark">Bernardo Raposo<span class="dot">.</span></div>' +
    '</div></div>';

  var FOOTER =
    '<div class="frame"><div class="footer" style="justify-content: flex-end">' +
      '<span><a href="mailto:hi@bernardoraposo.com">hi@bernardoraposo.com</a> &nbsp; <a href="https://linkedin.com/in/braposo" target="_blank" rel="noopener">LinkedIn</a></span>' +
    '</div></div>';

  function renderInput() {
    app.innerHTML =
      MASTHEAD +
      '<div class="frame">' +
        '<h1 class="lede">Paste the role. I\'ll tell you <em>where I\'d fit</em>.</h1>' +
        '<p class="sub">Drop in a job description and I\'ll give you an honest read — what I bring, where the gaps are, and what makes me different from the rest of your pipeline.<br></br>You\'ll get a link you can keep.</p>' +
        '<div class="composer">' +
          '<textarea id="jd" placeholder="Paste the full job description here…" aria-label="Job description">' + esc(state.jd) + '</textarea>' +
          (state.error ? '<div class="error">' + esc(state.error) + '</div>' : '') +
          '<div class="row">' +
            '<button class="primary" id="go">See where I fit</button>' +
            '<span class="hint">' + (DEMO ? 'Demo mode — no API call' : 'Takes about ten seconds') + '</span>' +
          '</div>' +
        '</div>' +
      '</div>' +
      FOOTER;

    document.getElementById("go").addEventListener("click", runAnalyze);
    var ta = document.getElementById("jd");
    ta.addEventListener("input", function () { state.jd = ta.value; });
    ta.addEventListener("keydown", function (e) {
      if ((e.metaKey || e.ctrlKey) && e.key === "Enter") runAnalyze();
    });
  }

  function renderLoading() {
    app.innerHTML = MASTHEAD + '<div class="frame"><div class="loading">Reading the role, thinking it through<span class="pen"></span></div></div>';
  }

  function renderReport(r, id) {
    var cats = (r.categories || []).map(function (c) {
      var col = tierColor(tier(c.score));
      return (
        '<div class="cat">' +
          '<div class="cat-score" style="color:' + col + '">' + esc(c.score) + '</div>' +
          '<div class="cat-name">' + esc(c.name) + '</div>' +
          '<div class="cat-body">' +
            '<div class="cat-meter"><span class="fill" data-target="' + c.score + '%" style="background:' + col + '"></span></div>' +
            '<div class="cat-note">' + esc(c.note) + '</div>' +
          '</div>' +
        '</div>'
      );
    }).join("");

    var diffs = (r.differentiators || []).map(function (d, i) {
      return (
        '<div class="diff">' +
          '<div class="diff-idx">' + String(i + 1).padStart(2, "0") + '</div>' +
          '<div class="diff-headline">' + esc(d.headline) + '</div>' +
          '<div class="diff-detail">' + esc(d.detail) + '</div>' +
        '</div>'
      );
    }).join("");

    var roleLine = esc(r.job_title || "This role");
    if (r.company) roleLine += ' <span class="company">at ' + esc(r.company) + '</span>';
    var vClass = verdictClass(r.overall_verdict);
    var vColor = tierColor(vClass);

    app.innerHTML =
      MASTHEAD +
      '<div class="frame"><div class="report">' +
        '<div class="to-line">On fit for</div>' +
        '<h1 class="role-title">' + roleLine + '</h1>' +

        '<div class="verdict">' +
          '<div class="verdict-score">' +
            '<span class="num" style="color:' + vColor + '">' + esc(r.overall_score) + '</span>' +
            '<span class="verdict-meter"><span class="fill" data-target="' + r.overall_score + '%" style="background:' + vColor + '"></span></span>' +
          '</div>' +
          '<div class="verdict-copy">' +
            '<span class="verdict-label" style="color:' + vColor + '">' + esc(verdictLabel(r.overall_verdict)) + '</span>' +
            '<p class="pitch">' + esc(r.pitch) + '</p>' +
          '</div>' +
        '</div>' +

        '<div class="section-label">Where I land</div>' +
        '<div class="cats">' + cats + '</div>' +

        '<div class="section-label">What sets me apart</div>' +
        '<div class="diffs">' + diffs + '</div>' +

        '<div class="closing-wrap">' +
          (r.closing ? '<p class="closing">' + esc(r.closing) + '</p>' : '') +
          '<div class="sign">— Bernardo<small>Available now · Remote-first · Harrogate, UK</small></div>' +
        '</div>' +

        '<div class="sharebar">' +
          '<span class="lbl">' + (state.cached ? '<b>Already analysed.</b> This role was run before — same link, same read.' : '<b>Keep this link.</b> It\'ll always show this exact read.') + '</span>' +
          '<button class="linkbtn" id="copy">Copy link</button>' +
          '<a class="linkbtn" href="/bernardo-raposo-cv.pdf" target="_blank" rel="noopener">Download CV</a>' +
          '<button class="linkbtn" id="new">New role</button>' +
        '</div>' +
      '</div></div>' +
      FOOTER;

    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        Array.prototype.forEach.call(document.querySelectorAll(".fill"), function (el) {
          el.style.width = el.getAttribute("data-target");
        });
      });
    });

    var copyBtn = document.getElementById("copy");
    copyBtn.addEventListener("click", function () {
      var url = location.origin + location.pathname + "?r=" + encodeURIComponent(id);
      navigator.clipboard.writeText(url).then(function () {
        copyBtn.textContent = "Link copied";
        copyBtn.classList.add("done");
        setTimeout(function () { copyBtn.textContent = "Copy link"; copyBtn.classList.remove("done"); }, 2200);
      });
    });
    document.getElementById("new").addEventListener("click", function () {
      history.pushState({}, "", location.pathname + (DEMO ? "?demo=1" : ""));
      state.view = "input"; state.report = null; state.id = null; state.error = null; state.jd = ""; state.cached = false;
      renderInput();
    });
  }

  function render() {
    if (state.view === "loading") return renderLoading();
    if (state.view === "report" && state.report) return renderReport(state.report, state.id);
    return renderInput();
  }

  var DEMO_REPORT = {
    job_title: "Head of Frontend Engineering",
    company: "Aurora Health",
    overall_score: 88,
    overall_verdict: "STRONG_MATCH",
    pitch: "This is close to the job I've been doing for five years, just with a sharper product edge. I lead technically while staying hands-on, and I've taken a platform through exactly this kind of modernisation before.",
    categories: [
      { name: "Technical fit", score: 92, note: "React, Next.js, TypeScript and design systems are my daily tools — I've built two design systems from scratch." },
      { name: "Leadership & management", score: 90, note: "Five years as EM, hiring and promoting engineers while staying the technical authority." },
      { name: "Domain & context", score: 74, note: "No direct healthcare experience, but I've worked in regulated, high-trust B2C products before." },
      { name: "Ways of working", score: 86, note: "High-trust, high-context, product-minded — this matches how the JD describes the team." },
      { name: "Seniority & scope", score: 88, note: "The scope here — platform, team and roadmap — is exactly what I owned at SingleStore." }
    ],
    differentiators: [
      { headline: "Player-coach by design", detail: "I stay in code review and architecture debates while managing people — not a manager who left engineering behind." },
      { headline: "Shipped two replatformings", detail: "Led the vision and execution for major platform rewrites at both SingleStore and TravelRepublic." },
      { headline: "Early on AI in production", detail: "Shipped an AI assistant and one of the first MCP servers in our space, ahead of much bigger competitors." }
    ],
    closing: "If this is the kind of platform thinking you're after, I'd love to talk."
  };

  function runAnalyze() {
    var jd = (state.jd || "").trim();
    if (jd.length < 20) { state.error = "Paste a bit more of the role so I can give you a real read."; return render(); }
    state.error = null;
    state.view = "loading";
    render();

    if (DEMO) {
      setTimeout(function () {
        state.report = DEMO_REPORT; state.id = "demo"; state.cached = false; state.view = "report";
        history.pushState({}, "", location.pathname + "?demo=1&r=demo");
        render();
      }, 700);
      return;
    }

    fetch("/api/analyze", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ jobDescription: jd }),
    })
      .then(function (res) { return res.json().then(function (d) { return { ok: res.ok, d: d }; }); })
      .then(function (out) {
        if (!out.ok) throw new Error(out.d && out.d.error ? out.d.error : "Something went wrong.");
        state.report = out.d.report; state.id = out.d.id; state.cached = !!out.d.cached; state.view = "report";
        history.pushState({}, "", location.pathname + "?r=" + encodeURIComponent(out.d.id));
        render();
      })
      .catch(function (err) {
        state.view = "input"; state.error = err.message || "Something went wrong. Try again."; render();
      });
  }

  function loadFromPermalink(id) {
    if (DEMO) { state.report = DEMO_REPORT; state.id = "demo"; state.view = "report"; render(); return; }
    state.view = "loading"; render();
    fetch("/api/report?id=" + encodeURIComponent(id))
      .then(function (res) { return res.json().then(function (d) { return { ok: res.ok, d: d }; }); })
      .then(function (out) {
        if (!out.ok) throw new Error("This link couldn't be found.");
        state.report = out.d.report; state.id = id; state.cached = false; state.view = "report"; render();
      })
      .catch(function () {
        state.view = "input"; state.error = "That link couldn't be found — it may have expired. You can run a fresh one below."; render();
      });
  }

  var params = new URLSearchParams(location.search);
  var rid = params.get("r");
  if (rid) loadFromPermalink(rid);
  else renderInput();

  window.addEventListener("popstate", function () {
    var p = new URLSearchParams(location.search).get("r");
    if (p) loadFromPermalink(p);
    else { state.view = "input"; renderInput(); }
  });
})();
</script>
</body>
</html>
