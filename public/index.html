<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bernardo Raposo — where I'd fit</title>
<meta name="description" content="Paste a role and I'll tell you, honestly, where I'd fit." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --accent: oklch(0.52 0.14 250);
    --accent-deep: oklch(0.40 0.14 250);
    --accent-soft: oklch(0.52 0.14 250 / 0.12);
    --good: oklch(0.5 0.12 155);
    --good-soft: oklch(0.5 0.12 155 / 0.12);
    --warn: oklch(0.62 0.14 70);
    --warn-soft: oklch(0.62 0.14 70 / 0.14);
    --weak: oklch(0.52 0.15 25);
    --weak-soft: oklch(0.52 0.15 25 / 0.12);
    --paper: #ffffff;
    --ink: #26241f;
    --sub: #6b675c;
    --body2: #45423a;
    --hair: rgba(38, 36, 31, 0.14);
    --track: rgba(38, 36, 31, 0.09);
    --sans: 'IBM Plex Sans', 'Helvetica Neue', sans-serif;
    --display: 'Schibsted Grotesk', 'Helvetica Neue', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
    --maxw: 760px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: #eeece7; color: var(--ink);
    font-family: var(--sans); -webkit-font-smoothing: antialiased;
  }
  a { color: var(--ink); text-decoration: none; border-bottom: 1px solid var(--accent); }
  a:hover { color: var(--accent-deep); }
  .sheet {
    max-width: var(--maxw); margin: 0 auto; background: var(--paper);
    min-height: 100vh; box-shadow: 0 0 40px rgba(0,0,0,0.10);
  }
  .wrap { padding: 0 0 clamp(60px, 10vw, 90px); }
  .inner { padding: 0 clamp(20px, 6vw, 50px); }

  /* Masthead — dark ink band, bolder */
  .masthead {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; padding: 22px clamp(20px, 6vw, 50px); background: var(--ink); flex-wrap: wrap;
  }
  .mark { font-family: var(--display); font-size: clamp(19px, 3.6vw, 22px); font-weight: 700; letter-spacing: -0.02em; color: #fff; }
  .mark .dot { color: var(--accent); }
  .kicker {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: oklch(0.85 0.02 90 / 0.7);
  }

  /* Input state */
  .lede {
    font-family: var(--display); font-size: clamp(38px, 9vw, 64px); font-weight: 700;
    line-height: 1.04; letter-spacing: -0.03em; margin: clamp(36px, 8vw, 64px) 0 0; max-width: 14ch;
  }
  .lede em { font-style: normal; color: var(--accent); }
  .sub { margin: 20px 0 0; font-size: clamp(16px, 2.2vw, 18px); line-height: 1.6; color: var(--sub); max-width: 46ch; }

  .composer { margin-top: 34px; padding: 0 clamp(20px, 6vw, 50px); }
  textarea {
    width: 100%; min-height: 190px; resize: vertical; background: #faf9f6;
    border: 1px solid var(--hair); border-radius: 6px; padding: 16px 18px;
    font-family: var(--sans); font-size: 15px; line-height: 1.6; color: var(--ink);
    transition: border-color 0.18s ease, box-shadow 0.18s ease;
  }
  textarea::placeholder { color: #a19d92; }
  textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

  .row { display: flex; align-items: center; gap: 16px; margin-top: 16px; flex-wrap: wrap; }
  button.primary {
    appearance: none; border: none; background: var(--ink); color: #fff;
    font-family: var(--sans); font-weight: 600; font-size: 15px; letter-spacing: 0.01em;
    padding: 14px 24px; border-radius: 6px; cursor: pointer; transition: background 0.18s ease, transform 0.12s ease;
    width: 100%;
  }
  @media (min-width: 480px) { button.primary { width: auto; } }
  button.primary:hover { background: var(--accent-deep); }
  button.primary:active { transform: translateY(1px); }
  button.primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .hint { font-family: var(--mono); font-size: 12px; color: var(--sub); }

  .loading {
    margin: 40px clamp(20px, 6vw, 50px) 0; font-family: var(--display); font-size: 19px; font-weight: 500; color: var(--sub);
    display: flex; align-items: center; gap: 8px;
  }
  .loading .pen { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: pulse 1.1s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:0.25;transform:scale(0.8);} 50%{opacity:1;transform:scale(1.15);} }

  .error {
    margin: 24px clamp(20px, 6vw, 50px) 0; padding: 14px 16px; border-left: 3px solid var(--weak);
    background: var(--weak-soft); color: var(--weak); font-size: 14px; border-radius: 0 6px 6px 0;
  }

  /* Report */
  .report { animation: rise 0.5s cubic-bezier(0.2,0.7,0.2,1) both; }
  @keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

  .to-line { margin: clamp(26px, 5vw, 40px) clamp(20px, 6vw, 50px) 0; font-family: var(--mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--sub); }
  .role-title {
    font-family: var(--display); font-size: clamp(28px, 6vw, 42px); line-height: 1.08;
    letter-spacing: -0.03em; margin: 8px clamp(20px, 6vw, 50px) 0; font-weight: 700;
  }
  .role-title .company { color: var(--accent); }

  /* Verdict hero — full-bleed dark band, huge numeral */
  .verdict-hero {
    display: flex; align-items: center; justify-content: space-between; gap: clamp(20px, 4vw, 32px);
    margin-top: clamp(24px, 5vw, 36px); padding: clamp(28px, 6vw, 42px) clamp(20px, 6vw, 50px);
    background: var(--ink); color: #fff; flex-wrap: wrap;
  }
  .verdict-score { display: flex; align-items: baseline; gap: 6px; flex: none; }
  .verdict-score .num {
    font-family: var(--display); font-weight: 700; font-size: clamp(56px, 12vw, 92px); line-height: 1;
    letter-spacing: -0.04em;
  }
  .verdict-score .of100 { font-family: var(--mono); font-size: 14px; color: oklch(0.85 0.02 90 / 0.55); }
  .verdict-copy { flex: 1; min-width: 220px; }
  .chip {
    display: inline-block; font-family: var(--mono); font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; padding: 6px 13px; border-radius: 100px;
  }
  .chip.strong { background: var(--good); color: #0d1a12; }
  .chip.good { background: var(--accent); color: #fff; }
  .chip.partial { background: var(--warn); color: #241a05; }
  .chip.weak { background: var(--weak); color: #fff; }
  .verdict-copy .score-label { margin: 12px 0 0; font-size: 14px; color: oklch(0.85 0.02 90 / 0.75); line-height: 1.5; max-width: 40ch; }

  .pitch {
    font-family: var(--display); font-size: clamp(22px, 4vw, 28px); font-weight: 500;
    line-height: 1.4; letter-spacing: -0.015em; margin: clamp(32px, 6vw, 46px) clamp(20px, 6vw, 50px) 0;
  }
  .pitch::first-letter { color: var(--accent); font-weight: 700; }

  .section-label {
    margin: clamp(40px, 7vw, 58px) clamp(20px, 6vw, 50px) 20px; font-family: var(--mono); font-size: 11px;
    letter-spacing: 0.16em; text-transform: uppercase; color: var(--sub);
    display: flex; align-items: center; gap: 10px;
  }
  .section-label::after { content: ""; flex: 1; height: 1px; background: var(--hair); }

  /* Category visualizations — bold numeral cards */
  .cats { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); margin: 0 clamp(20px, 6vw, 50px); border-top: 1px solid var(--hair); border-left: 1px solid var(--hair); }
  .cat {
    padding: 22px 18px 24px; background: var(--paper);
    border-right: 1px solid var(--hair); border-bottom: 1px solid var(--hair);
    display: flex; flex-direction: column; gap: 12px; position: relative;
  }
  .cat-top { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
  .cat-score { font-family: var(--display); font-weight: 700; font-size: 34px; letter-spacing: -0.02em; line-height: 1; }
  .cat-bar { height: 4px; border-radius: 2px; background: var(--track); overflow: hidden; }
  .cat-bar .fill { display: block; height: 100%; border-radius: 2px; width: 0%; transition: width 0.9s cubic-bezier(0.2,0.7,0.2,1); }
  .cat-name { font-weight: 600; font-size: 13.5px; letter-spacing: -0.005em; }
  .cat-note { font-size: 12.5px; line-height: 1.5; color: var(--sub); text-wrap: pretty; }

  /* Differentiators — Swiss numerals */
  .diffs { display: flex; flex-direction: column; gap: 0; margin: 0 clamp(20px, 6vw, 50px); }
  .diff {
    display: grid; grid-template-columns: clamp(48px,10vw,72px) 1fr; gap: 4px 20px;
    padding: clamp(22px, 4vw, 30px) 0; border-top: 1px solid var(--hair); align-items: start;
  }
  .diff:first-child { border-top: none; }
  .diff-idx {
    font-family: var(--display); font-size: clamp(28px, 5vw, 38px); color: var(--accent); font-weight: 700;
    grid-row: span 2; line-height: 1; letter-spacing: -0.02em;
  }
  .diff-headline { font-family: var(--display); font-size: clamp(18px, 3vw, 22px); font-weight: 600; line-height: 1.3; letter-spacing: -0.01em; }
  .diff-detail { font-size: 14.5px; line-height: 1.55; color: var(--sub); margin-top: 6px; max-width: 56ch; }

  .closing-band {
    margin-top: clamp(40px, 7vw, 56px); padding: clamp(32px, 6vw, 46px) clamp(20px, 6vw, 50px);
    background: var(--ink); color: #fff;
  }
  .closing {
    font-family: var(--display); font-size: clamp(19px, 3vw, 23px); font-weight: 500; line-height: 1.5;
    margin: 0; letter-spacing: -0.01em;
  }
  .sign { margin-top: 20px; font-family: var(--display); font-weight: 700; font-size: 19px; color: var(--accent); }
  .sign small { display: block; font-family: var(--mono); font-size: 12px; color: oklch(0.85 0.02 90 / 0.6); margin-top: 5px; font-weight: 400; letter-spacing: 0.02em; }

  /* Share bar — mobile-friendly, sticky */
  .sharebar {
    position: sticky; bottom: 12px; margin: 32px clamp(20px, 6vw, 50px) 0; background: var(--paper);
    border: 1px solid var(--hair); border-radius: 10px; padding: 12px; display: flex;
    align-items: center; gap: 10px; box-shadow: 0 8px 28px rgba(28,27,25,0.1); flex-wrap: wrap;
  }
  .sharebar .lbl { font-size: 12.5px; color: var(--sub); flex: 1; min-width: 140px; }
  .sharebar .lbl b { color: var(--ink); font-weight: 600; }
  .linkbtn {
    appearance: none; border: 1px solid var(--hair); background: #faf9f6; color: var(--ink);
    font-family: var(--sans); font-weight: 600; font-size: 13px; padding: 10px 14px; border-radius: 6px;
    cursor: pointer; transition: border-color 0.15s ease, color 0.15s ease;
  }
  .linkbtn:hover { border-color: var(--accent); color: var(--accent-deep); }
  .linkbtn.done { border-color: var(--good); color: var(--good); }

  .footer {
    margin: 40px clamp(20px, 6vw, 50px) 0; padding-top: 20px; border-top: 1px solid var(--hair); font-family: var(--mono);
    font-size: 12px; color: var(--sub); display: flex; justify-content: space-between; gap: 14px; flex-wrap: wrap;
  }

  .restart { margin-top: 26px; }
  .restart button {
    appearance: none; background: none; border: none; color: var(--accent-deep); font-family: var(--sans);
    font-size: 14px; font-weight: 600; cursor: pointer; padding: 0;
  }
  .restart button:hover { text-decoration: underline; }

  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 3px; }

  @media (max-width: 480px) {
    .verdict-hero { flex-direction: column; align-items: flex-start; }
    .sharebar { position: static; box-shadow: none; }
  }
</style>
</head>
<body>
  <div class="sheet"><main class="wrap" id="app"></main></div>

<script>
(function () {
  "use strict";

  var app = document.getElementById("app");
  var state = { view: "input", jd: "", report: null, id: null, error: null, cached: false };
  var DEMO = new URLSearchParams(location.search).get("demo") === "1";

  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function tier(n) {
    if (n >= 90) return "strong";
    if (n >= 75) return "good";
    if (n >= 60) return "partial";
    return "weak";
  }
  function tierColor(t) {
    return ({ strong: "var(--good)", good: "var(--accent)", partial: "var(--warn)", weak: "var(--weak)" })[t];
  }
  function verdictClass(v) {
    return ({ STRONG_MATCH: "strong", GOOD_MATCH: "good", PARTIAL_MATCH: "partial", WEAK_MATCH: "weak" })[v] || "good";
  }
  function verdictLabel(v) {
    return ({ STRONG_MATCH: "Strong fit", GOOD_MATCH: "Good fit", PARTIAL_MATCH: "Partial fit", WEAK_MATCH: "Honest stretch" })[v] || "Good fit";
  }

  var MASTHEAD =
    '<div class="masthead">' +
      '<div class="mark">Bernardo Raposo<span class="dot">.</span></div>' +
      '<div class="kicker">Where I\'d fit</div>' +
    '</div>';

  var FOOTER =
    '<div class="footer">' +
      '<span>Written by me, with a little help from Claude.</span>' +
      '<span><a href="mailto:hi@bernardoraposo.com">hi@bernardoraposo.com</a> · <a href="https://linkedin.com/in/braposo" target="_blank" rel="noopener">LinkedIn</a></span>' +
    '</div>';

  function renderInput() {
    app.innerHTML =
      MASTHEAD +
      '<div class="inner">' +
      '<h1 class="lede">Paste the role. I\'ll tell you <em>where I\'d fit</em>.</h1>' +
      '<p class="sub">Drop in a job description below and I\'ll give you an honest read — what I bring, where the gaps are, and what makes me different from the other people in your pipeline. You\'ll get a link you can keep.</p>' +
      '</div>' +
      '<div class="composer">' +
        '<textarea id="jd" placeholder="Paste the full job description here…" aria-label="Job description">' + esc(state.jd) + '</textarea>' +
        (state.error ? '<div class="error">' + esc(state.error) + '</div>' : '') +
        '<div class="row">' +
          '<button class="primary" id="go">See where I fit</button>' +
          '<span class="hint">' + (DEMO ? 'Demo mode — no API call' : 'Takes about ten seconds') + '</span>' +
        '</div>' +
      '</div>' +
      FOOTER;

    document.getElementById("go").addEventListener("click", runAnalyze);
    var ta = document.getElementById("jd");
    ta.addEventListener("input", function () { state.jd = ta.value; });
    ta.addEventListener("keydown", function (e) {
      if ((e.metaKey || e.ctrlKey) && e.key === "Enter") runAnalyze();
    });
  }

  function renderLoading() {
    app.innerHTML = MASTHEAD + '<div class="loading">Reading the role, thinking it through<span class="pen"></span></div>';
  }

  function renderReport(r, id) {
    var cats = (r.categories || []).map(function (c) {
      var t = tier(c.score);
      return (
        '<div class="cat">' +
          '<div class="cat-top"><div class="cat-score" style="color:' + tierColor(t) + '">' + esc(c.score) + '</div></div>' +
          '<div class="cat-bar"><span class="fill" data-target="' + c.score + '%" style="background:' + tierColor(t) + '"></span></div>' +
          '<div class="cat-name">' + esc(c.name) + '</div>' +
          '<div class="cat-note">' + esc(c.note) + '</div>' +
        '</div>'
      );
    }).join("");

    var diffs = (r.differentiators || []).map(function (d, i) {
      return (
        '<div class="diff">' +
          '<div class="diff-idx">' + String(i + 1).padStart(2, "0") + '</div>' +
          '<div>' +
            '<div class="diff-headline">' + esc(d.headline) + '</div>' +
            '<div class="diff-detail">' + esc(d.detail) + '</div>' +
          '</div>' +
        '</div>'
      );
    }).join("");

    var roleLine = esc(r.job_title || "This role");
    if (r.company) roleLine += ' <span class="company">at ' + esc(r.company) + '</span>';
    var vClass = verdictClass(r.overall_verdict);

    app.innerHTML =
      MASTHEAD +
      '<div class="report">' +
        '<div class="to-line">On fit for</div>' +
        '<h1 class="role-title">' + roleLine + '</h1>' +

        '<div class="verdict-hero">' +
          '<div class="verdict-score"><span class="num">' + esc(r.overall_score) + '</span><span class="of100">/ 100</span></div>' +
          '<div class="verdict-copy">' +
            '<span class="chip ' + vClass + '">' + esc(verdictLabel(r.overall_verdict)) + '</span>' +
            '<p class="score-label">' + esc(r.pitch) + '</p>' +
          '</div>' +
        '</div>' +

        '<div class="section-label">Where I land</div>' +
        '<div class="cats">' + cats + '</div>' +

        '<div class="section-label">What sets me apart</div>' +
        '<div class="diffs">' + diffs + '</div>' +

        '<div class="closing-band">' +
          (r.closing ? '<p class="closing">' + esc(r.closing) + '</p>' : '') +
          '<div class="sign">— Bernardo<small>Available now · Remote-first · Harrogate, UK</small></div>' +
        '</div>' +

        '<div class="sharebar">' +
          '<span class="lbl">' + (state.cached ? '<b>Already analysed.</b> This role was run before — same link, same read.' : '<b>Keep this link.</b> It\'ll always show this exact read.') + '</span>' +
          '<button class="linkbtn" id="copy">Copy link</button>' +
          '<a class="linkbtn" href="/bernardo-raposo-cv.pdf" target="_blank" rel="noopener">Download CV</a>' +
          '<button class="linkbtn" id="new">New role</button>' +
        '</div>' +
      '</div>' +
      FOOTER;

    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        Array.prototype.forEach.call(document.querySelectorAll(".cat-bar .fill"), function (el) {
          el.style.width = el.getAttribute("data-target");
        });
      });
    });

    var copyBtn = document.getElementById("copy");
    copyBtn.addEventListener("click", function () {
      var url = location.origin + location.pathname + "?r=" + encodeURIComponent(id);
      navigator.clipboard.writeText(url).then(function () {
        copyBtn.textContent = "Link copied";
        copyBtn.classList.add("done");
        setTimeout(function () { copyBtn.textContent = "Copy link"; copyBtn.classList.remove("done"); }, 2200);
      });
    });
    document.getElementById("new").addEventListener("click", function () {
      history.pushState({}, "", location.pathname + (DEMO ? "?demo=1" : ""));
      state.view = "input"; state.report = null; state.id = null; state.error = null; state.jd = ""; state.cached = false;
      renderInput();
    });
  }

  function render() {
    if (state.view === "loading") return renderLoading();
    if (state.view === "report" && state.report) return renderReport(state.report, state.id);
    return renderInput();
  }

  var DEMO_REPORT = {
    job_title: "Head of Frontend Engineering",
    company: "Aurora Health",
    overall_score: 88,
    overall_verdict: "STRONG_MATCH",
    pitch: "This is close to the job I've been doing for five years, just with a sharper product edge. I lead technically while staying hands-on, and I've taken a platform through exactly this kind of modernisation before.",
    categories: [
      { name: "Technical fit", score: 92, note: "React, Next.js, TypeScript and design systems are my daily tools — I've built two design systems from scratch." },
      { name: "Leadership & management", score: 90, note: "Five years as EM, hiring and promoting engineers while staying the technical authority." },
      { name: "Domain & context", score: 74, note: "No direct healthcare experience, but I've worked in regulated, high-trust B2C products before." },
      { name: "Ways of working", score: 86, note: "High-trust, high-context, product-minded — this matches how the JD describes the team." },
      { name: "Seniority & scope", score: 88, note: "The scope here — platform + team + roadmap — is exactly what I owned at SingleStore." }
    ],
    differentiators: [
      { headline: "Player-coach by design", detail: "I stay in code review and architecture debates while managing people — not a manager who left engineering behind." },
      { headline: "Shipped two replatformings", detail: "Led the vision and execution for major platform rewrites at both SingleStore and TravelRepublic." },
      { headline: "Early on AI in production", detail: "Shipped an AI assistant and one of the first MCP servers in our space, ahead of much bigger competitors." }
    ],
    closing: "If this sounds like the kind of platform thinking you're after, I'd love to talk."
  };

  function runAnalyze() {
    var jd = (state.jd || "").trim();
    if (jd.length < 20) { state.error = "Paste a bit more of the role so I can give you a real read."; return render(); }
    state.error = null;
    state.view = "loading";
    render();

    if (DEMO) {
      setTimeout(function () {
        state.report = DEMO_REPORT;
        state.id = "demo";
        state.cached = false;
        state.view = "report";
        history.pushState({}, "", location.pathname + "?demo=1&r=demo");
        render();
      }, 700);
      return;
    }

    fetch("/api/analyze", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ jobDescription: jd }),
    })
      .then(function (res) { return res.json().then(function (d) { return { ok: res.ok, d: d }; }); })
      .then(function (out) {
        if (!out.ok) throw new Error(out.d && out.d.error ? out.d.error : "Something went wrong.");
        state.report = out.d.report;
        state.id = out.d.id;
        state.cached = !!out.d.cached;
        state.view = "report";
        history.pushState({}, "", location.pathname + "?r=" + encodeURIComponent(out.d.id));
        render();
      })
      .catch(function (err) {
        state.view = "input";
        state.error = err.message || "Something went wrong. Try again.";
        render();
      });
  }

  function loadFromPermalink(id) {
    if (DEMO) {
      state.report = DEMO_REPORT; state.id = "demo"; state.view = "report"; render();
      return;
    }
    state.view = "loading";
    render();
    fetch("/api/report?id=" + encodeURIComponent(id))
      .then(function (res) { return res.json().then(function (d) { return { ok: res.ok, d: d }; }); })
      .then(function (out) {
        if (!out.ok) throw new Error("This link couldn't be found.");
        state.report = out.d.report;
        state.id = id;
        state.cached = false;
        state.view = "report";
        render();
      })
      .catch(function () {
        state.view = "input";
        state.error = "That link couldn't be found — it may have expired. You can run a fresh one below.";
        render();
      });
  }

  var params = new URLSearchParams(location.search);
  var rid = params.get("r");
  if (rid) loadFromPermalink(rid);
  else renderInput();

  window.addEventListener("popstate", function () {
    var p = new URLSearchParams(location.search).get("r");
    if (p) loadFromPermalink(p);
    else { state.view = "input"; renderInput(); }
  });
})();
</script>
</body>
</html>
